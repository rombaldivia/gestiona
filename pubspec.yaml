  flutter_lints: ^6.0.0
  flutter_riverpod: ^3.1.0

  # PDF + Share
  pdf: ^3.11.3
  printing: ^5.14.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

dev_dependencies:
